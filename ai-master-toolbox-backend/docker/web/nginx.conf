
server {
    listen 80;
    server_name aimastertoolbox.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name aimastertoolbox.cn;

    ssl_certificate /etc/nginx/ssl/aimastertoolbox.cn_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/aimastertoolbox.cn.key;

    # 如果您有证书链文件，请指定证书链文件
    ssl_trusted_certificate /etc/nginx/ssl/aimastertoolbox.cn_bundle.pem;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /static/ {
        alias /usr/share/nginx/html/img;
    }

    location /api/ {
        proxy_pass http://ai-django:8000;  # 修改为你的后端服务地址
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws {
        proxy_pass http://ai-django:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}